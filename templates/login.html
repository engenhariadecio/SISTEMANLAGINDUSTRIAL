<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Controle de Depósito NLAG</title>
  <link rel="icon" href="{{ url_for('static', filename='logo_decio.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Manrope', system-ui, sans-serif; }
    body {
      background: linear-gradient(125deg, #2BA45C 0%, #1668C0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 18px; padding: 40px 36px 36px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px rgba(16,28,48,.28); position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(120deg, #2BA45C, #1668C0);
    }
    .login-logo {
      width: 66px; height: 66px; border-radius: 16px; object-fit: cover; margin-bottom: 14px;
      box-shadow: 0 4px 18px rgba(22,104,192,.28);
    }
    .brand-eyebrow { font-size: .62rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: #8B94A3; }
    .brand-title  { font-size: 1.18rem; font-weight: 800; color: #16202E; letter-spacing: -.02em; }
    .brand-sub    { font-size: .86rem; color: #56616F; }
    .btn-login {
      background: linear-gradient(120deg, #2BA45C 0%, #1668C0 100%); color: #fff; border: none;
      padding: 12px; font-size: 1rem; font-weight: 700; border-radius: 10px; width: 100%;
      box-shadow: 0 2px 12px rgba(22,104,192,.3); transition: filter 0.15s;
    }
    .btn-login:hover { filter: brightness(1.06); color: #fff; }
    .form-control:focus { border-color:#1668C0; box-shadow:0 0 0 .2rem rgba(22,104,192,.15); }
    .input-group-text { background:#F2F5FA; color:#56616F; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <img src="{{ url_for('static', filename='logo_decio.png') }}" alt="Décio Indústria Metalúrgica" class="login-logo">
    <div class="brand-eyebrow mb-1">Décio · Manutenção Industrial</div>
    <div class="brand-title">Controle de Depósito NLAG</div>
    <p class="brand-sub mb-4">Acesse com suas credenciais</p>
    {% if erro %}
      <div class="alert alert-danger py-2">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3 text-start">
        <label class="form-label fw-bold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="usuario" class="form-control form-control-lg"
                 placeholder="Digite o usuário" autofocus required>
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label fw-bold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="senha" class="form-control form-control-lg"
                 placeholder="Digite a senha" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
    </form>
  </div>
</body>
</html>
